<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub Admin - Test</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        body { background: #0a0f1e; color: white; font-family: system-ui; padding: 20px; }
        .card { background: rgba(15,25,45,0.9); border-radius: 20px; padding: 20px; margin-bottom: 20px; }
        button { background: #6366f1; border: none; padding: 10px 20px; border-radius: 40px; color: white; cursor: pointer; }
        input { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); padding: 10px; border-radius: 40px; color: white; width: 100%; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2>🔐 Login de Prueba</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="loginBtn">Iniciar sesión</button>
    <div id="errorMsg" style="color:#ef4444; margin-top:10px;"></div>
</div>

<div id="adminPanel" class="card" style="display:none;">
    <h2>📺 Series en Firebase</h2>
    <button id="refreshBtn">🔄 Refrescar</button>
    <div id="seriesList" style="margin-top:20px;"></div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyDvfEZydbSdzZlN93WVnUnGXWdhk11xngQ",
    authDomain: "streamhub-app-5aa0e.firebaseapp.com",
    projectId: "streamhub-app-5aa0e",
    storageBucket: "streamhub-app-5aa0e.firebasestorage.app",
    messagingSenderId: "728979558000",
    appId: "1:728979558000:web:293b0114fe0d2201e1aeb5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

async function loadSeries() {
    const listDiv = document.getElementById('seriesList');
    listDiv.innerHTML = '<p>Cargando...</p>';
    
    try {
        const snapshot = await db.collection('series').get();
        console.log('Series encontradas:', snapshot.size);
        
        if (snapshot.size === 0) {
            listDiv.innerHTML = '<p>📭 No hay series en Firebase. Crea una colección llamada "series" y agrega un documento.</p>';
            return;
        }
        
        let html = '<ul style="list-style:none;">';
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `<li style="padding:10px; border-bottom:1px solid rgba(255,255,255,0.1);">
                        <strong>${data.title || 'Sin título'}</strong><br>
                        ID: ${doc.id}<br>
                        Año: ${data.year || 'N/A'}<br>
                        ${data.imageUrl ? `<img src="${data.imageUrl}" style="width:50px; height:75px; object-fit:cover; border-radius:8px; margin-top:8px;">` : ''}
                    </li>`;
        });
        html += '</ul>';
        listDiv.innerHTML = html;
        
    } catch (error) {
        console.error('Error:', error);
        listDiv.innerHTML = `<p style="color:#ef4444;">❌ Error al cargar: ${error.message}</p>`;
    }
}

document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
        await auth.signInWithEmailAndPassword(email, password);
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelector('.card').style.display = 'none';
        await loadSeries();
    } catch(e) {
        document.getElementById('errorMsg').innerText = e.message;
    }
};

document.getElementById('refreshBtn').onclick = loadSeries;

// Si ya hay sesión activa
auth.onAuthStateChanged(async user => {
    if (user) {
        document.getElementById('adminPanel').style.display = 'block';
        document.querySelector('.card').style.display = 'none';
        await loadSeries();
    }
});
</script>
</body>
</html>
