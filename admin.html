<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamHub Admin - Con Vimeus (Versión Funcional)</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #1e1b4b 100%);
            color: white;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .card {
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        input, textarea, select {
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            font-size: 14px;
            width: 100%;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }
        button {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            color: white;
            cursor: pointer;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
        }
        button.danger { background: linear-gradient(90deg, #ef4444, #dc2626); }
        button.success { background: linear-gradient(90deg, #10b981, #059669); }
        button.warning { background: linear-gradient(90deg, #f59e0b, #d97706); }
        button.info { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        .hidden { display: none; }
        .nav-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.1); }
        th { color: #c084fc; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .badge-active { background: #10b981; }
        .badge-inactive { background: #ef4444; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .stat-card { background: rgba(0,0,0,0.4); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-card h2 { font-size: 2rem; color: #c084fc; }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            overflow-y: auto;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 24px;
            padding: 30px;
            max-width: 600px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 150px; }
        .image-preview {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            margin-bottom: 10px;
            background-color: #0f172a;
        }
        .search-results {
            background: #0f172a;
            border-radius: 16px;
            margin-top: 10px;
            max-height: 300px;
            overflow-y: auto;
        }
        .search-result-item {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .search-result-item:hover { background: #334155; }
        .loading-text { text-align: center; padding: 20px; color: #94a3b8; }
        .vimeus-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-left: 10px;
        }
        .vimeus-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        .vimeus-card-item {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .vimeus-card-item:hover {
            transform: translateY(-5px);
        }
        .vimeus-card-poster {
            position: relative;
            width: 100%;
            padding-top: 150%;
            background: rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .vimeus-card-poster img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .vimeus-card-content {
            padding: 12px;
        }
        .vimeus-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .vimeus-card-meta {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        .vimeus-card-actions {
            display: flex;
            gap: 8px;
        }
        .vimeus-card-actions button {
            flex: 1;
            padding: 6px;
            font-size: 11px;
        }
        .vimeus-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .vimeus-tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .vimeus-tab.active {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
        }
        .vimeus-search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .vimeus-search-box input {
            flex: 1;
            margin-bottom: 0;
        }
        .vimeus-pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #10b981;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            z-index: 10000;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Pantalla de Login -->
    <div id="loginScreen" class="card" style="max-width: 400px; margin: 100px auto; text-align: center;">
        <h2 style="margin-bottom: 20px;">🔐 Panel Administrador</h2>
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="password" id="password" placeholder="Contraseña">
        <button id="loginBtn" style="width: 100%;">Iniciar sesión</button>
        <button id="guestBtn" style="width: 100%; margin-top: 10px; background: #f59e0b;">🎭 Modo Invitado</button>
        <p id="loginError" style="color: #ef4444; margin-top: 10px; display: none;"></p>
    </div>

    <!-- Panel Principal -->
    <div id="adminPanel" class="hidden">
        <div class="card" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <h1>🎬 StreamHub Admin <span class="vimeus-badge">Powered by Vimeus</span></h1>
            <div><span id="userEmail"></span> <button id="logoutBtn" class="danger">Salir</button></div>
        </div>

        <div class="nav-buttons">
            <button onclick="showSection('dashboard')">📊 Dashboard</button>
            <button onclick="showSection('users')">👥 Usuarios</button>
            <button onclick="showSection('movies')">🎬 Películas</button>
            <button onclick="showSection('series')">📺 Series</button>
            <button onclick="showSection('codes')">🔑 Códigos</button>
        </div>

        <!-- Dashboard -->
        <div id="dashboardSection" class="card">
            <h2>📊 Estadísticas</h2>
            <div class="stats" id="stats"></div>
            <h3>Últimos usuarios</h3>
            <div id="recentUsers"></div>
        </div>

        <!-- Usuarios -->
        <div id="usersSection" class="card hidden">
            <h2>👥 Usuarios</h2>
            <button id="refreshUsers" class="success" style="margin-bottom: 15px;">🔄 Refrescar</button>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </div>

        <!-- Películas -->
        <div id="moviesSection" class="card hidden">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h2>🎬 Películas</h2>
                <button id="addMovieBtn" class="success">➕ Importar de Vimeus</button>
            </div>
            <div id="moviesList"></div>
        </div>

        <!-- Series -->
        <div id="seriesSection" class="card hidden">
            <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                <h2>📺 Series</h2>
                <button id="addSerieBtn" class="success">➕ Importar de Vimeus</button>
            </div>
            <div id="seriesList"></div>
        </div>

        <!-- Códigos -->
        <div id="codesSection" class="card hidden">
            <h2>🔑 Códigos de invitación</h2>
            <button id="generateCode" class="success" style="margin-bottom: 15px;">✨ Generar nuevo código</button>
            <div style="overflow-x: auto;">
                <table>
                    <thead><tr><th>Código</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="codesTable"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal para importar contenido -->
<div id="importModal" class="modal">
    <div class="modal-content">
        <h3 id="modalTitle">Importar de Vimeus</h3>
        <div class="vimeus-search-box">
            <input type="text" id="searchInput" placeholder="Buscar... (ej: Fight Club, Game of Thrones)">
            <button id="searchBtn" class="info">Buscar</button>
        </div>
        <div id="searchResults" style="max-height: 400px; overflow-y: auto;"></div>
        <div class="modal-buttons" style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="closeModalBtn">Cancelar</button>
        </div>
    </div>
</div>

<script>
// ==================== CONFIGURACIÓN ====================
const firebaseConfig = {
    apiKey: "AIzaSyDvfEZydbSdzZlN93WVnUnGXWdhk11xngQ",
    authDomain: "streamhub-app-5aa0e.firebaseapp.com",
    projectId: "streamhub-app-5aa0e",
    storageBucket: "streamhub-app-5aa0e.firebasestorage.app",
    messagingSenderId: "728979558000",
    appId: "1:728979558000:web:293b0114fe0d2201e1aeb5"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentUser = null;
let currentSection = 'dashboard';
let isGuest = false;
let currentImportType = null;

// ==================== CONFIGURACIÓN DE VIMEUS ====================
const VIMEUS_API_KEY = "ak_aqxyOEsSQGl2kadq0QYzO2jTVCUaVV8J";
const VIMEUS_VIEW_KEY = "DS5uhD56-BZDJZpZ02is-fAGFj_aQGHquhQnWOqjy24";
const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

// ==================== FUNCIONES DE VIMEUS API ====================
async function fetchVimeusListings(type, page = 1, query = '') {
    const endpoints = {
        movies: 'https://vimeus.com/api/listing/movies',
        series: 'https://vimeus.com/api/listing/series'
    };
    
    const url = new URL(endpoints[type]);
    url.searchParams.append('page', page);
    
    console.log(`🔍 Fetching ${type} from Vimeus:`, url.toString());
    
    try {
        const response = await fetch(url.toString(), {
            method: 'GET',
            headers: {
                'X-API-Key': VIMEUS_API_KEY,
                'Accept': 'application/json'
            }
        });
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log(`📦 Received ${type} data:`, data);
        
        if (data.error === false && data.data) {
            let items = type === 'movies' ? data.data.movies : data.data.series;
            
            if (query) {
                items = items.filter(item => 
                    item.title && item.title.toLowerCase().includes(query.toLowerCase())
                );
            }
            
            return {
                items: items,
                currentPage: page,
                totalPages: data.data.pagination?.total_pages || 1,
                hasNext: data.data.pagination?.has_next || false
            };
        }
        
        return { items: [], currentPage: 1, totalPages: 1, hasNext: false };
        
    } catch (error) {
        console.error('❌ Error fetching from Vimeus:', error);
        showToast('Error de conexión con Vimeus', 'error');
        return { items: [], currentPage: 1, totalPages: 1, hasNext: false };
    }
}

function getEmbedUrl(type, tmdbId, season = null, episode = null) {
    let url = `https://vimeus.com/e/${type}?tmdb=${tmdbId}&view_key=${VIMEUS_VIEW_KEY}`;
    
    if ((type === 'serie' || type === 'anime') && season && episode) {
        url += `&se=${season}&ep=${episode}`;
    }
    
    return url;
}

// ==================== FUNCIONES DE AUTENTICACIÓN ====================
async function isAdmin(email) {
    const doc = await db.collection('admin').doc('config').get();
    if (doc.exists && doc.data().adminEmail === email) return true;
    return email === 'admin@streamhub.com';
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.style.background = type === 'error' ? '#ef4444' : '#10b981';
    toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// ==================== FUNCIONES DE CARGA ====================
async function loadStats() {
    try {
        const users = await db.collection('users').get();
        const codes = await db.collection('codes').where('used', '==', false).get();
        const movies = await db.collection('movies').get();
        const series = await db.collection('series').get();
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h2>${users.size}</h2><p>Usuarios</p></div>
            <div class="stat-card"><h2>${codes.size}</h2><p>Códigos</p></div>
            <div class="stat-card"><h2>${movies.size + series.size}</h2><p>Contenido</p></div>
        `;
        
        let recentHtml = '';
        const recent = [];
        users.forEach(doc => recent.push(doc.data().email));
        recent.slice(-5).reverse().forEach(email => {
            recentHtml += `<div style="padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1);">📧 ${email}</div>`;
        });
        document.getElementById('recentUsers').innerHTML = recentHtml || 'No hay usuarios';
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

async function loadUsers() {
    const container = document.getElementById('usersTable');
    try {
        const users = await db.collection('users').get();
        if (users.size === 0) {
            container.innerHTML = '<tr><td colspan="4" style="padding:40px; text-align:center;">No hay usuarios</td></tr>';
            return;
        }
        
        let html = '';
        users.forEach(doc => {
            const u = doc.data();
            html += `
                <tr>
                    <td style="padding:12px;">${escapeHtml(u.email || 'Sin email')}</td>
                    <td style="padding:12px;"><span class="badge" style="background:${u.isHost ? '#8b5cf6' : '#3b82f6'}">${u.isHost ? 'Anfitrión' : 'Cliente'}</span></td>
                    <td style="padding:12px;"><span class="badge ${u.active !== false ? 'badge-active' : 'badge-inactive'}">${u.active !== false ? 'Activo' : 'Suspendido'}</span></td>
                    <td style="padding:12px;">
                        <button onclick="toggleUserStatus('${doc.id}', ${u.active !== false})">${u.active !== false ? 'Suspender' : 'Activar'}</button>
                    </td>
                </tr>
            `;
        });
        container.innerHTML = html;
    } catch (error) {
        console.error(error);
    }
}

async function loadMovies() {
    const container = document.getElementById('moviesList');
    try {
        const snapshot = await db.collection('movies').get();
        
        if (snapshot.size === 0) {
            container.innerHTML = '<div class="loading-text">📭 No hay películas. Haz clic en "Importar de Vimeus" para empezar.</div>';
            return;
        }
        
        let html = '<div class="vimeus-grid">';
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `
                <div class="vimeus-card-item">
                    <div class="vimeus-card-poster">
                        ${data.imageUrl ? `<img src="${data.imageUrl}" alt="${escapeHtml(data.title)}">` : '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);"><i class="fas fa-film" style="font-size:48px;"></i></div>'}
                    </div>
                    <div class="vimeus-card-content">
                        <div class="vimeus-card-title">${escapeHtml(data.title)}</div>
                        <div class="vimeus-card-meta">TMDB: ${data.tmdbId || 'N/A'}</div>
                        <div class="vimeus-card-actions">
                            <button class="danger" onclick="deleteItem('movies', '${doc.id}')">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="loading-text" style="color:#ef4444;">Error al cargar películas</div>';
    }
}

async function loadSeries() {
    const container = document.getElementById('seriesList');
    try {
        const snapshot = await db.collection('series').get();
        
        if (snapshot.size === 0) {
            container.innerHTML = '<div class="loading-text">📭 No hay series. Haz clic en "Importar de Vimeus" para empezar.</div>';
            return;
        }
        
        let html = '<div class="vimeus-grid">';
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `
                <div class="vimeus-card-item">
                    <div class="vimeus-card-poster">
                        ${data.imageUrl ? `<img src="${data.imageUrl}" alt="${escapeHtml(data.title)}">` : '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);"><i class="fas fa-tv" style="font-size:48px;"></i></div>'}
                    </div>
                    <div class="vimeus-card-content">
                        <div class="vimeus-card-title">${escapeHtml(data.title)}</div>
                        <div class="vimeus-card-meta">TMDB: ${data.tmdbId || 'N/A'}</div>
                        <div class="vimeus-card-actions">
                            <button class="danger" onclick="deleteItem('series', '${doc.id}')">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        container.innerHTML = html;
    } catch (error) {
        console.error(error);
        container.innerHTML = '<div class="loading-text" style="color:#ef4444;">Error al cargar series</div>';
    }
}

async function loadCodes() {
    try {
        const snapshot = await db.collection('codes').get();
        let html = '';
        snapshot.forEach(doc => {
            const c = doc.data();
            html += `
                <tr>
                    <td style="padding:12px;"><code>${doc.id}</code></td>
                    <td style="padding:12px;"><span class="badge ${c.used ? 'badge-inactive' : 'badge-active'}">${c.used ? 'Usado' : 'Disponible'}</span></td>
                    <td style="padding:12px;"><button onclick="deleteCode('${doc.id}')" class="danger">🗑️</button></td>
                </tr>
            `;
        });
        document.getElementById('codesTable').innerHTML = html || '<tr><td colspan="3" style="padding:40px; text-align:center;">No hay códigos</td></tr>';
    } catch (error) {
        console.error(error);
    }
}

// ==================== IMPORTAR CONTENIDO ====================
function openImportModal(type) {
    if (isGuest) { alert('Modo invitado no puede importar'); return; }
    currentImportType = type;
    document.getElementById('modalTitle').innerText = type === 'movies' ? '🎬 Importar Película de Vimeus' : '📺 Importar Serie de Vimeus';
    document.getElementById('searchResults').innerHTML = '<div class="loading-text">🔍 Busca para ver resultados</div>';
    document.getElementById('importModal').style.display = 'flex';
    document.getElementById('searchInput').value = '';
    document.getElementById('searchInput').focus();
}

async function searchAndDisplay() {
    const query = document.getElementById('searchInput').value.trim();
    if (!query) {
        showToast('Ingresa un título para buscar', 'error');
        return;
    }
    
    const resultsDiv = document.getElementById('searchResults');
    resultsDiv.innerHTML = '<div class="loading-text"><i class="fas fa-spinner fa-spin"></i> Buscando en Vimeus...</div>';
    
    try {
        // Buscar en ambas páginas para tener más resultados
        let allItems = [];
        
        for (let page = 1; page <= 2; page++) {
            const result = await fetchVimeusListings(currentImportType, page, query);
            if (result.items && result.items.length > 0) {
                allItems.push(...result.items);
            }
            if (!result.hasNext) break;
        }
        
        if (allItems.length === 0) {
            resultsDiv.innerHTML = '<div class="loading-text">❌ No se encontraron resultados. Prueba con otro título.</div>';
            return;
        }
        
        // Mostrar resultados
        let html = '<div class="vimeus-grid">';
        allItems.forEach(item => {
            const posterUrl = item.poster ? `${TMDB_IMAGE_BASE}${item.poster}` : '';
            const embedUrl = getEmbedUrl(currentImportType === 'movies' ? 'movie' : 'serie', item.tmdb_id);
            
            html += `
                <div class="vimeus-card-item">
                    <div class="vimeus-card-poster">
                        ${posterUrl ? `<img src="${posterUrl}" alt="${escapeHtml(item.title)}">` : '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);"><i class="fas fa-film" style="font-size:36px;"></i></div>'}
                    </div>
                    <div class="vimeus-card-content">
                        <div class="vimeus-card-title">${escapeHtml(item.title)}</div>
                        <div class="vimeus-card-meta">TMDB: ${item.tmdb_id}</div>
                        <div class="vimeus-card-actions">
                            <button class="success" onclick="importContent(${item.tmdb_id}, '${escapeHtml(item.title)}', '${posterUrl}', '${embedUrl}')">
                                <i class="fas fa-download"></i> Importar
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        resultsDiv.innerHTML = html;
        
    } catch (error) {
        console.error(error);
        resultsDiv.innerHTML = '<div class="loading-text" style="color:#ef4444;">❌ Error al buscar contenido</div>';
    }
}

async function importContent(tmdbId, title, imageUrl, embedUrl) {
    if (isGuest) { showToast('Modo invitado no puede importar', 'error'); return; }
    
    try {
        const collection = currentImportType === 'movies' ? 'movies' : 'series';
        const docId = `${collection}_${tmdbId}`;
        
        const data = {
            tmdbId: tmdbId,
            title: title,
            imageUrl: imageUrl,
            embedUrl: embedUrl,
            createdAt: new Date()
        };
        
        await db.collection(collection).doc(docId).set(data);
        
        showToast(`✅ "${title}" importado correctamente`);
        
        // Cerrar modal y refrescar
        document.getElementById('importModal').style.display = 'none';
        refreshCurrentSection();
        
    } catch (error) {
        console.error(error);
        showToast('Error al importar: ' + error.message, 'error');
    }
}

// ==================== ACCIONES ====================
window.toggleUserStatus = async (uid, isActive) => {
    if (isGuest) { alert('Modo invitado'); return; }
    try {
        await db.collection('users').doc(uid).update({ active: !isActive });
        await loadUsers();
        await loadStats();
    } catch (error) {
        alert('Error al actualizar usuario');
    }
};

window.deleteItem = async (type, id) => {
    if (isGuest) { alert('Modo invitado'); return; }
    if (confirm('¿Eliminar permanentemente este contenido?')) {
        try {
            await db.collection(type).doc(id).delete();
            await refreshCurrentSection();
            showToast('✅ Contenido eliminado');
        } catch (error) {
            alert('Error al eliminar');
        }
    }
};

window.deleteCode = async (codeId) => {
    if (isGuest) { alert('Modo invitado'); return; }
    if (confirm('¿Eliminar este código?')) {
        try {
            await db.collection('codes').doc(codeId).delete();
            await loadCodes();
            await loadStats();
        } catch (error) {
            console.error(error);
        }
    }
};

async function refreshCurrentSection() {
    if (currentSection === 'users') await loadUsers();
    else if (currentSection === 'movies') await loadMovies();
    else if (currentSection === 'series') await loadSeries();
    else if (currentSection === 'codes') await loadCodes();
    else if (currentSection === 'dashboard') await loadStats();
}

window.showSection = async (section) => {
    currentSection = section;
    document.querySelectorAll('#adminPanel .card').forEach(c => c.classList.add('hidden'));
    const sections = {
        'dashboard': 'dashboardSection',
        'users': 'usersSection', 
        'movies': 'moviesSection',
        'series': 'seriesSection',
        'codes': 'codesSection'
    };
    document.getElementById(sections[section]).classList.remove('hidden');
    await refreshCurrentSection();
};

async function generateNewCode() {
    if (isGuest) { alert('Modo invitado'); return; }
    try {
        const codeId = 'INV_' + Math.random().toString(36).substring(2, 10).toUpperCase();
        await db.collection('codes').doc(codeId).set({ ownerId: 'admin', used: false, createdAt: new Date() });
        showToast(`✅ Código generado: ${codeId}`);
        await loadCodes();
        await loadStats();
    } catch (error) {
        console.error(error);
    }
}

// Exponer funciones globales
window.openImportModal = openImportModal;
window.importContent = importContent;
window.searchAndDisplay = searchAndDisplay;

// ==================== EVENT LISTENERS ====================
document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        if (await isAdmin(email)) {
            currentUser = cred.user;
            isGuest = false;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('userEmail').innerText = email;
            await loadStats();
            await loadUsers();
            await loadMovies();
            await loadSeries();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').innerText = 'No eres administrador';
            await auth.signOut();
        }
    } catch(e) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').innerText = e.message;
    }
};

document.getElementById('guestBtn').onclick = async () => {
    isGuest = true;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    document.getElementById('userEmail').innerText = 'Invitado (solo lectura)';
    await loadStats();
    await loadUsers();
    await loadMovies();
    await loadSeries();
};

document.getElementById('logoutBtn').onclick = async () => {
    await auth.signOut();
    location.reload();
};

document.getElementById('refreshUsers').onclick = loadUsers;
document.getElementById('addMovieBtn').onclick = () => openImportModal('movies');
document.getElementById('addSerieBtn').onclick = () => openImportModal('series');
document.getElementById('generateCode').onclick = generateNewCode;
document.getElementById('searchBtn').onclick = searchAndDisplay;
document.getElementById('closeModalBtn').onclick = () => document.getElementById('importModal').style.display = 'none';
document.getElementById('searchInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') searchAndDisplay();
});

// Inicializar
db.collection('admin').doc('config').get().then(doc => {
    if (!doc.exists) db.collection('admin').doc('config').set({ adminEmail: 'admin@streamhub.com' });
});

console.log('✅ Panel de administración con Vimeus cargado correctamente');
console.log('📌 API Key configurada:', VIMEUS_API_KEY.substring(0, 20) + '...');
</script>
