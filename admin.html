<!DOCTYPE html>
<html lang="es">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui; }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0f172a 50%, #1e1b4b 100%);

            padding: 20px;

        .card {
            background: rgba(15, 25, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 24px;
 padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

            border-radius: 40px;
            border: none;
            font-size: 14px;
            width: 100%;
            margin-bottom: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        button {
            background: linear-gradient(90deg, #6366f1, #8b5cf6);

            cursor: pointer;
            font-weight: bold;
            padding: 10px 20px;

        .badge-active { background: #10b981; }
        .badge-inactive { background: #ef4444; }

        .form-group label { display: block; margin-bottom: 5px; font-size: 0.8rem; color: #94a3b8; }
        .form-row { display: flex; gap: 15px; flex-wrap: wrap; }
        .form-row .form-group { flex: 1; min-width: 150px; }
        .image-preview {
            width: 100%;
            height: 200px;
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            margin-bottom: 10px;
            background-color: #0f172a;

        .search-results {

<script>
// ==================== CONFIGURACIÓN ====================
const firebaseConfig = {

// ==================== CONFIGURACIÓN DE VIMEUS ====================
const VIMEUS_API_KEY = "ak_aqxyOEsSQGl2kadq0QYzO2jTVCUaVV8J";
const VIMEUS_VIEW_KEY = "DS5uhD56-BZDJZpZ02is-fAGFj_aQGHquhQnWOqjy24";
const VIMEUS_API_BASE = "https://vimeus.com/api";
const TMDB_IMAGE_BASE = "https://image.tmdb.org/t/p/w500";

// ==================== FUNCIONES DE VIMEUS API ====================
async function fetchFromVimeus(endpoint, page = 1) {
    const url = `${VIMEUS_API_BASE}${endpoint}?page=${page}`;
    console.log('📡 Llamando a Vimeus API:', url);
    
    try {
        const response = await fetch(url, {
            method: 'GET',
            headers: {
                'X-API-Key': VIMEUS_API_KEY,
                'Accept': 'application/json'
            }
        });
        
        console.log('📡 Respuesta HTTP:', response.status);
        
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }
        
        const data = await response.json();
        console.log('📡 Datos recibidos:', data);
        
        return data;
    } catch (error) {
        console.error('❌ Error en fetchFromVimeus:', error);
        throw error;
    }
}

async function searchVimeusContent(query, type) {
    const results = [];
    let page = 1;
    let hasMore = true;
    const endpoint = type === 'movies' ? '/listing/movies' : '/listing/series';
    
    while (hasMore && page <= 3) { // Máximo 3 páginas
        try {
            const data = await fetchFromVimeus(endpoint, page);
            
            if (data.error === false && data.data) {
                const items = type === 'movies' ? data.data.movies : data.data.series;
                
                if (items && items.length > 0) {
                    const filtered = items.filter(item => 
                        item.title && item.title.toLowerCase().includes(query.toLowerCase())
                    );
                    results.push(...filtered);
                }
                
                hasMore = data.data.pagination?.has_next || false;
                page++;
            } else {
                hasMore = false;
            }
        } catch (error) {
            console.error('Error en página', page, ':', error);
            hasMore = false;
        }
    }
    
    console.log(`🔍 Encontrados ${results.length} resultados para "${query}"`);
    return results;
}

function getEmbedUrl(type, tmdbId, imdbId, season = null, episode = null) {
    const identifier = tmdbId ? `tmdb=${tmdbId}` : `imdb=${imdbId}`;
    
    if (type === 'movies') {
        return `https://vimeus.com/e/movie?${identifier}&view_key=${VIMEUS_VIEW_KEY}`;
    } else if (type === 'series') {
        let url = `https://vimeus.com/e/serie?${identifier}&view_key=${VIMEUS_VIEW_KEY}`;
        if (season && episode) {
            url += `&se=${season}&ep=${episode}`;
        }
        return url;
    }
    return '';
}

// ==================== FUNCIONES DE AUTENTICACIÓN ====================
async function isAdmin(email) {
    const doc = await db.collection('admin').doc('config').get();
    if (doc.exists && doc.data().adminEmail === email) return true;
    return email === 'admin@streamhub.com';
}

function escapeHtml(text) {
    if (!text) return '';
    return text.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// ==================== FUNCIONES DE CARGA ====================
async function loadStats() {
    try {
        const users = await db.collection('users').get();
        const hosts = await db.collection('users').where('isHost', '==', true).get();
        const codes = await db.collection('codes').where('used', '==', false).get();
        const movies = await db.collection('movies').get();
        const series = await db.collection('series').get();
        
        document.getElementById('stats').innerHTML = `
            <div class="stat-card"><h2>${users.size}</h2><p>Usuarios</p></div>
            <div class="stat-card"><h2>${hosts.size}</h2><p>Anfitriones</p></div>
            <div class="stat-card"><h2>${codes.size}</h2><p>Códigos</p></div>
            <div class="stat-card"><h2>${movies.size + series.size}</h2><p>Contenido</p></div>
        `;
        
        let recentHtml = '';
        const recent = [];
        users.forEach(doc => recent.push(doc.data().email));
        recent.slice(-5).reverse().forEach(email => {
            recentHtml += `<div style="padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.1);">📧 ${email}</div>`;
        });
        document.getElementById('recentUsers').innerHTML = recentHtml || 'No hay usuarios';
    } catch (error) {
        console.error('Error loading stats:', error);
    }
}

async function loadUsers() {
    const container = document.getElementById('usersTable');
    if (!container) return;
    
    try {
        const users = await db.collection('users').get();
        if (users.size === 0) {
            container.innerHTML = '<tr><td colspan="4" style="padding:40px; text-align:center;">No hay usuarios registrados</td></tr>';
            return;
        }
        
        let html = '';
        users.forEach(doc => {
            const u = doc.data();
            const email = u.email || 'Sin email';
            const role = u.isHost ? 'Anfitrión' : 'Cliente';
            const roleColor = u.isHost ? '#8b5cf6' : '#3b82f6';
            const status = u.active !== false ? 'Activo' : 'Suspendido';
            const statusClass = u.active !== false ? 'badge-active' : 'badge-inactive';
            
            html += `
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <td style="padding:12px;">${escapeHtml(email)}</td>
                    <td style="padding:12px;"><span class="badge" style="background:${roleColor}">${role}</span></td>
                    <td style="padding:12px;"><span class="badge ${statusClass}">${status}</span></td>
                    <td style="padding:12px;">
                        <button onclick="toggleUserStatus('${doc.id}', ${u.active !== false})" style="padding:5px 10px;">${u.active !== false ? 'Suspender' : 'Activar'}</button>
                        <button onclick="toggleUserHost('${doc.id}', ${u.isHost || false})" style="background:#ff9800; padding:5px 10px;">${u.isHost ? 'Quitar Host' : 'Hacer Host'}</button>
                    </td>
                </tr>
            `;
        });
        container.innerHTML = html;
    } catch (error) {
        console.error('Error loading users:', error);
        container.innerHTML = '<tr><td colspan="4" style="padding:40px; text-align:center; color:#ef4444;">Error al cargar usuarios</td></tr>';
    }
}

async function loadMovies() {
    const container = document.getElementById('moviesList');
    try {
        const snapshot = await db.collection('movies').get();
        
        if (snapshot.size === 0) {
            container.innerHTML = '<div class="loading-text">📭 No hay películas. Haz clic en "+ Agregar desde Vimeus" para empezar.</div>';
            return;
        }
        
        let html = '<div style="overflow-x: auto;"><table style="width:100%;"><thead><tr><th>Título</th><th>Imagen</th><th>URL del Reproductor</th><th>Acciones</th></tr></thead><tbody>';
        
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `
                <tr>
                    <td style="padding:12px;">${escapeHtml(data.title || '—')}</td>
                    <td style="padding:12px;">${data.imageUrl ? `<img src="${data.imageUrl}" style="width:40px;height:60px;object-fit:cover;border-radius:8px;">` : '—'}</td>
                    <td style="padding:12px;"><code style="font-size:11px;">${data.embedUrl ? data.embedUrl.substring(0,50)+'...' : '—'}</code></td>
                    <td style="padding:12px;">
                        <button onclick="deleteItem('movies', '${doc.id}')" class="danger">🗑️ Eliminar</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table></div>';
        container.innerHTML = html;
    } catch (error) {
        console.error('Error loading movies:', error);
        container.innerHTML = '<div class="error-message">❌ Error al cargar las películas</div>';
    }
}

async function loadSeries() {
    const container = document.getElementById('seriesList');
    try {
        const snapshot = await db.collection('series').get();
        
        if (snapshot.size === 0) {
            container.innerHTML = '<div class="loading-text">📭 No hay series. Haz clic en "+ Agregar desde Vimeus" para empezar.</div>';
            return;
        }
        
        let html = '<div style="overflow-x: auto;"><table style="width:100%;"><thead><tr><th>Título</th><th>Imagen</th><th>URL del Reproductor</th><th>Acciones</th></tr></thead><tbody>';
        
        snapshot.forEach(doc => {
            const data = doc.data();
            html += `
                <tr>
                    <td style="padding:12px;">${escapeHtml(data.title || '—')}</td>
                    <td style="padding:12px;">${data.imageUrl ? `<img src="${data.imageUrl}" style="width:40px;height:60px;object-fit:cover;border-radius:8px;">` : '—'}</td>
                    <td style="padding:12px;"><code style="font-size:11px;">${data.embedUrl ? data.embedUrl.substring(0,50)+'...' : '—'}</code></td>
                    <td style="padding:12px;">
                        <button onclick="deleteItem('series', '${doc.id}')" class="danger">🗑️ Eliminar</button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table></div>';

async function loadCodes() {
    try {
        const snapshot = await db.collection('codes').get();
        let html = '';
        snapshot.forEach(doc => {
            const c = doc.data();
            html += `
                <tr style="border-bottom: 1px solid rgba(255,255,255,0.1);">
                    <td style="padding:12px;"><code>${doc.id}</code></td>
                    <td style="padding:12px;"><span class="badge ${c.used ? 'badge-inactive' : 'badge-active'}">${c.used ? 'Usado' : 'Disponible'}</span></td>
                    <td style="padding:12px;"><button onclick="deleteCode('${doc.id}')" class="danger">🗑️</button></td>
                </tr>
            `;
        });
        document.getElementById('codesTable').innerHTML = html || '<tr><td colspan="3" style="padding:40px; text-align:center;">No hay códigos</td></tr>';
    } catch (error) {
        console.error('Error loading codes:', error);

}

// ==================== MODAL DE BÚSQUEDA ====================
function openAddModal(type) {
    if (isGuest) { alert('Modo invitado'); return; }
    currentEditType = type;
    currentEditId = null;
    
    const modal = document.getElementById('contentModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalFields = document.getElementById('modalFields');
    
    modalTitle.innerText = type === 'movies' ? '🎬 Nueva Película (desde Vimeus)' : '📺 Nueva Serie (desde Vimeus)';
    
    modalFields.innerHTML = `
        <div class="form-group">
            <label>🔍 Buscar en Vimeus</label>
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="searchInput" placeholder="Ej: Fight Club, Game of Thrones..." style="flex: 1;">
                <button type="button" id="searchBtn" class="info">Buscar</button>
            </div>
            <div id="searchResults" class="search-results" style="display:none;"></div>
        </div>
        
        <div style="border-top: 1px solid rgba(255,255,255,0.2); margin: 15px 0; padding-top: 15px;">
            <p><strong>O agregar manualmente:</strong></p>
            <div class="form-row">
                <div class="form-group"><label>ID TMDB</label><input id="tmdbId" placeholder="Ej: 550"></div>
                <div class="form-group"><label>ID IMDb</label><input id="imdbId" placeholder="Ej: tt0137523"></div>
            </div>
        </div>
        
        <div class="form-group"><label>Título *</label><input id="title" placeholder="Título del contenido"></div>
        <div class="form-group"><label>URL Imagen (Poster)</label><input id="imageUrl" placeholder="https://image.tmdb.org/t/p/w500/..."></div>
        <div id="imagePreview" class="image-preview"></div>
        <div class="form-group"><label>Año</label><input id="year" placeholder="2024"></div>
        
        <div id="seasonsContainer" style="display: ${type === 'series' ? 'block' : 'none'};">
            <div class="seasons-container">
                <div class="seasons-title">📺 Temporadas y Episodios</div>
                <div id="seasonsList"></div>
                <button type="button" id="addSeasonBtn" class="add-season-btn" style="margin-top: 15px;">+ Agregar Temporada</button>
            </div>
        </div>
    `;
    
    // Preview de imagen
    const imageUrlInput = document.getElementById('imageUrl');
    const preview = document.getElementById('imagePreview');
    if (imageUrlInput && preview) {
        imageUrlInput.oninput = () => {
            if (imageUrlInput.value) {
                preview.style.backgroundImage = `url('${imageUrlInput.value}')`;
                preview.style.backgroundSize = 'cover';
            } else {
                preview.style.backgroundImage = '';
            }
        };
    }
    
    // Búsqueda en Vimeus
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsDiv = document.getElementById('searchResults');
    
    searchBtn.onclick = async () => {
        const query = searchInput.value.trim();
        if (!query) {
            alert('Por favor ingresa un título para buscar');
            return;
        }
        
        resultsDiv.style.display = 'block';
        resultsDiv.innerHTML = '<div class="loading-text">🔍 Buscando en Vimeus...</div>';
        
        try {
            const results = await searchVimeusContent(query, type);
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="loading-text">❌ No se encontraron resultados. Prueba con otro título.</div>';
                return;
            }
            
            resultsDiv.innerHTML = '';
            results.forEach(result => {
                const posterUrl = result.poster ? `${TMDB_IMAGE_BASE}${result.poster}` : '';
                const embedUrl = getEmbedUrl(type, result.tmdb_id, result.imdb_id);
                
                const item = document.createElement('div');
                item.className = 'search-result-item';
                item.onclick = () => {
                    // Llenar el formulario automáticamente
                    document.getElementById('title').value = result.title || '';
                    document.getElementById('tmdbId').value = result.tmdb_id || '';
                    document.getElementById('imdbId').value = result.imdb_id || '';
                    document.getElementById('imageUrl').value = posterUrl;
                    if (preview && posterUrl) {
                        preview.style.backgroundImage = `url('${posterUrl}')`;
                        preview.style.backgroundSize = 'cover';
                    }
                    
                    resultsDiv.style.display = 'none';
                    searchInput.value = '';
                    
                    alert('✅ Contenido seleccionado. Ahora puedes guardarlo.');
                };
                
                item.innerHTML = `
                    ${posterUrl ? `<img src="${posterUrl}" style="width:40px;height:60px;object-fit:cover;border-radius:8px;">` : '<div style="width:40px;height:60px;background:#334155;border-radius:8px;display:flex;align-items:center;justify-content:center;">🎬</div>'}
                    <div style="flex:1">
                        <strong>${escapeHtml(result.title)}</strong>
                        <div style="font-size:12px; color:#94a3b8;">TMDB ID: ${result.tmdb_id || 'N/A'}</div>
                        <div style="font-size:11px; color:#667eea;">${embedUrl.substring(0,60)}...</div>
                    </div>
                    <button style="background:#10b981; border:none; padding:5px 15px; border-radius:40px; cursor:pointer;">Seleccionar</button>
                `;
                resultsDiv.appendChild(item);
            });
        } catch (error) {
            console.error('Error en búsqueda:', error);
            resultsDiv.innerHTML = `<div class="loading-text" style="color:#ef4444;">❌ Error al buscar: ${error.message}</div>`;
        }
    };
    
    // Inicializar temporadas para series
    if (type === 'series') {
        const seasonsList = document.getElementById('seasonsList');
        if (seasonsList) {
            seasonsList.innerHTML = '';
        }
        document.getElementById('addSeasonBtn')?.addEventListener('click', () => addSeasonToForm());
    }
    
    modal.style.display = 'flex';
}

function addSeasonToForm() {
    const seasonsList = document.getElementById('seasonsList');
    const seasonId = Date.now();
    const seasonDiv = document.createElement('div');
    seasonDiv.className = 'season-card';
    seasonDiv.setAttribute('data-season-id', seasonId);
    seasonDiv.innerHTML = `
        <div class="season-header">
            <input type="text" class="season-title" placeholder="Título de la temporada" style="flex:1; margin:0;">
            <button type="button" class="danger" onclick="this.closest('.season-card').remove()">🗑️</button>
        </div>
        <div class="episodes-list" id="episodes-${seasonId}">
            <div class="episodes-title">📋 Episodios</div>
            <button type="button" class="info btn-icon" onclick="addEpisodeToForm('${seasonId}')">+ Agregar Episodio</button>
        </div>
    `;
    seasonsList.appendChild(seasonDiv);
}

function addEpisodeToForm(seasonId) {
    const episodesContainer = document.getElementById(`episodes-${seasonId}`);
    const episodeDiv = document.createElement('div');
    episodeDiv.className = 'episode-item';
    episodeDiv.innerHTML = `
        <div class="episode-header">
            <input type="text" class="episode-title" placeholder="Título del episodio" style="flex:1;">
            <button type="button" class="danger btn-icon" onclick="this.closest('.episode-item').remove()">✕</button>
        </div>
        <div class="form-row">
            <div class="form-group"><label>Número</label><input type="number" class="episode-number" placeholder="1"></div>
            <div class="form-group"><label>Temporada</label><input type="number" class="episode-season" placeholder="1"></div>
        </div>
    `;
    episodesContainer.insertBefore(episodeDiv, episodesContainer.lastElementChild);
}

async function saveContent() {
    if (!currentEditType) return;
    if (isGuest) { alert('Modo invitado'); closeModal(); return; }
    
    try {
        const type = currentEditType;
        const id = currentEditId || db.collection(type).doc().id;
        const tmdbId = document.getElementById('tmdbId')?.value;
        const imdbId = document.getElementById('imdbId')?.value;
        
        // Generar embed URL automáticamente
        let embedUrl = '';
        if (type === 'movies' && (tmdbId || imdbId)) {
            embedUrl = getEmbedUrl('movies', tmdbId, imdbId);
        } else if (type === 'series' && (tmdbId || imdbId)) {
            embedUrl = getEmbedUrl('series', tmdbId, imdbId);
        }
        
        const updateData = {
            title: document.getElementById('title')?.value || 'Sin título',
            embedUrl: embedUrl,
            imageUrl: document.getElementById('imageUrl')?.value || '',
            year: document.getElementById('year')?.value || '',
            tmdbId: tmdbId || null,
            imdbId: imdbId || null,
            updatedAt: new Date()
        };
        
        // Recolectar temporadas y episodios para series
        if (type === 'series') {
            const seasons = [];
            const seasonCards = document.querySelectorAll('#seasonsList .season-card');
            seasonCards.forEach(card => {
                const seasonTitle = card.querySelector('.season-title')?.value || '';
                const episodes = [];
                const episodeItems = card.querySelectorAll('.episode-item');
                episodeItems.forEach(ep => {
                    const epTitle = ep.querySelector('.episode-title')?.value || '';
                    const epNumber = ep.querySelector('.episode-number')?.value || '';
                    const epSeason = ep.querySelector('.episode-season')?.value || '';
                    if (epTitle) {
                        episodes.push({
                            title: epTitle,
                            number: parseInt(epNumber) || 0,
                            season: parseInt(epSeason) || 0                        });
                    }
                });
                if (seasonTitle || episodes.length > 0) {
                    seasons.push({ title: seasonTitle, episodes });
                }
            });
            updateData.seasons = seasons;
        }
        
        if (!currentEditId) updateData.createdAt = new Date();
        
        await db.collection(type).doc(id).set(updateData, { merge: true });
        alert('✅ Contenido guardado correctamente con enlaces de Vimeus');
        closeModal();
        refreshCurrentSection();
    } catch (error) {
        console.error('Error saving:', error);
        alert('Error al guardar: ' + error.message);
    }
}

function closeModal() {
    document.getElementById('contentModal').style.display = 'none';
    currentEditType = null;
    currentEditId = null;
}

        await db.collection('users').doc(uid).update({ active: !isActive });
        await loadUsers();
        await loadStats();
    } catch (error) {
        console.error(error);
        alert('Error al actualizar usuario');
    }
};

window.toggleUserHost = async (uid, isHost) => {
    if (isGuest) { alert('Modo invitado'); return; }
    try {
        await db.collection('users').doc(uid).update({ isHost: !isHost });
        await loadUsers();
        await loadStats();
    } catch (error) {

};

window.deleteItem = async (type, id) => {
    if (isGuest) { alert('Modo invitado'); return; }
    if (confirm('¿Eliminar permanentemente este contenido?')) {
        try {
            await db.collection(type).doc(id).delete();
            await refreshCurrentSection();
        } catch (error) {
            console.error(error);
            alert('Error al eliminar');
        }
    }
};

window.deleteCode = async (codeId) => {
    if (isGuest) { alert('Modo invitado'); return; }
    if (confirm('¿Eliminar este código?')) {
        try {
            await db.collection('codes').doc(codeId).delete();
            await loadCodes();
            await loadStats();
        } catch (error) {
            console.error(error);
        }
    }
};

async function refreshCurrentSection() {
    if (currentSection === 'users') await loadUsers();
    else if (currentSection === 'movies') await loadMovies();
    else if (currentSection === 'series') await loadSeries();
    else if (currentSection === 'codes') await loadCodes();
    else if (currentSection === 'dashboard') await loadStats();
}

window.showSection = async (section) => {
    currentSection = section;
    document.querySelectorAll('#adminPanel .card').forEach(c => c.classList.add('hidden'));
    const sections = {
        'dashboard': 'dashboardSection',
        'users': 'usersSection', 
        'movies': 'moviesSection',
        'series': 'seriesSection',
        'codes': 'codesSection'
    };
    document.getElementById(sections[section]).classList.remove('hidden');
    await refreshCurrentSection();
};

async function generateNewCode() {
    if (isGuest) { alert('Modo invitado'); return; }
    try {
        const codeId = 'INV_' + Math.random().toString(36).substring(2, 10).toUpperCase();
        await db.collection('codes').doc(codeId).set({ ownerId: 'admin', used: false, createdAt: new Date() });
        alert(`✅ Código generado: ${codeId}`);
        await loadCodes();
        await loadStats();
    } catch (error) {
        console.error(error);
    }
}

window.addEpisodeToForm = addEpisodeToForm;
window.addSeasonToForm = addSeasonToForm;

document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    try {
        const cred = await auth.signInWithEmailAndPassword(email, password);
        if (await isAdmin(email)) {
            currentUser = cred.user;
            isGuest = false;
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
            document.getElementById('userEmail').innerText = email;
            await loadStats();
            await loadUsers();
            await loadSeries();
            await loadMovies();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('loginError').innerText = 'No eres administrador';
            await auth.signOut();
        }
    } catch(e) {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').innerText = e.message;
    }
};

    isGuest = true;

};
